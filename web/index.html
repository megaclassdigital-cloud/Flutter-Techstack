<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="techstack">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>
  <link rel="preload" href="assets/harudusfx.mp3" as="audio" type="audio/mpeg">

  <title>techstack</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    (function () {
      const soundUrl = 'assets/harudusfx.mp3';
      const startedKey = 'techstack_opening_sound_started';
      let retryAttached = false;

      function markStarted() {
        try {
          window.sessionStorage.setItem(startedKey, '1');
        } catch (_) {}
      }

      function playOpeningSound(allowRetry) {
        try {
          if (window.sessionStorage.getItem(startedKey) === '1') return;
        } catch (_) {}

        const audio = new Audio(soundUrl);
        audio.volume = 0.5;
        audio.preload = 'auto';
        audio.play()
          .then(markStarted)
          .catch(function () {
            if (!allowRetry || retryAttached) return;
            retryAttached = true;
            window.addEventListener('pointerdown', function retry() {
              window.removeEventListener('pointerdown', retry);
              playOpeningSound(false);
            }, { once: true });
          });
      }

      window.techstackPlayOpeningSound = playOpeningSound;
      playOpeningSound(true);
    })();
  </script>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
